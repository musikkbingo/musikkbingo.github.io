<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Bingo - Player</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="player-view">
    <!-- Header -->
    <div class="header">
      <div class="nav-bar">
        <div class="room-info">
          <span class="room-code-small" id="room-code-display">BINGO-????</span>
        </div>
        <div>
          <span class="player-name" id="player-name-display">Loading...</span>
        </div>
        <div>
          <span class="round-indicator" id="round-info">Round 1</span>
        </div>
      </div>
      <p class="round-info text-muted mt-1" id="round-requirement"></p>
    </div>

    <div class="container">
      <!-- Bingo Board -->
      <div class="bingo-board" id="bingo-board"></div>

      <!-- BINGO Button -->
      <div class="text-center mt-2 mb-2">
        <button class="bingo-btn" id="bingo-btn">
          🎉 BINGO! 🎉
        </button>
      </div>

      <!-- Toast area -->
      <div id="toast-area" class="text-center mb-2" style="min-height:1.5em;">
        <span id="toast-msg" class="hidden" style="padding:0.4em 1em; border-radius:999px; font-weight:600; font-size:0.95rem;"></span>
      </div>

      <!-- Song List -->
      <div class="card">
        <div class="card-header">
          <h3>Song List</h3>
        </div>
        <div class="song-list-grid" id="song-list"></div>
      </div>
    </div>
  </div>

  <!-- Winner Celebration Overlay -->
  <div class="modal-overlay" id="celebration-overlay">
    <div class="modal">
      <h2 id="celebration-title">BINGO!</h2>
      <div class="winner-name" id="celebration-winner"></div>
      <p class="text-muted" id="celebration-subtitle"></p>
      <button class="btn btn-primary btn-lg" id="celebration-dismiss">Continue</button>
    </div>
  </div>

  <!-- Confetti container -->
  <div class="confetti-container" id="confetti-container"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- Confetti -->
  <script>
    window.launchConfetti = function () {
      var container = document.getElementById('confetti-container');
      if (!container) return;
      container.innerHTML = '';
      var colors = ['#ff2d75', '#ffab00', '#00e676', '#7b2ff7', '#00b0ff', '#ff6d00', '#e040fb', '#ffd600'];
      var shapes = ['50%', '0', '0 50% 50% 0'];
      for (var i = 0; i < 150; i++) {
        var p = document.createElement('div');
        p.className = 'confetti-piece';
        p.style.left = Math.random() * 100 + '%';
        p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        p.style.animationDelay = (Math.random() * 3) + 's';
        p.style.animationDuration = (2.5 + Math.random() * 3) + 's';
        p.style.width = (5 + Math.random() * 10) + 'px';
        p.style.height = (5 + Math.random() * 10) + 'px';
        p.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];
        container.appendChild(p);
      }
      setTimeout(function () { container.innerHTML = ''; }, 6000);
    };
  </script>

  <!-- App scripts -->
  <script src="js/firebase-config.js"></script>
  <script src="js/songs.js"></script>
  <script src="js/board.js"></script>
  <script src="js/bingo-check.js"></script>
  <script src="js/game.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
