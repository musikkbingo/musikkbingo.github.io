<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Bingo - Player</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="player-view">
    <!-- Header -->
    <div class="player-header">
      <div class="player-header-name" id="player-name-display">Loading...</div>
      <div class="player-header-row">
        <span class="player-header-code" id="room-code-display">BINGO-????</span>
        <span class="round-indicator" id="round-info">Round 1</span>
      </div>
      <div class="player-header-req" id="round-requirement"></div>
    </div>

    <!-- Fixed toast (always visible regardless of scroll/tab) -->
    <div id="toast-area" class="toast-fixed">
      <span id="toast-msg" class="hidden"></span>
    </div>

    <!-- Mobile Tabs (hidden on desktop) -->
    <div class="mobile-tabs" id="mobile-tabs">
      <button class="mobile-tab active" data-tab="board">🎯 Board</button>
      <button class="mobile-tab" data-tab="songs">🎵 Songs</button>
      <button class="mobile-tab" data-tab="all" id="scroll-mode-btn">📜 All</button>
    </div>

    <div class="container">
      <!-- Board Tab Content -->
      <div class="tab-content" id="tab-board">
        <div class="bingo-board" id="bingo-board"></div>

        <div class="text-center mt-2 mb-2">
          <button class="bingo-btn" id="bingo-btn">
            🎉 BINGO! 🎉
          </button>
        </div>
      </div>

      <!-- Songs Tab Content (hidden on mobile by default) -->
      <div class="tab-content hidden" id="tab-songs">
        <div class="card">
          <div class="card-header">
            <h3>🎵 Song List</h3>
          </div>
          <div class="song-list-grid" id="song-list"></div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var tabs = document.querySelectorAll('.mobile-tab');
        var boardTab = document.getElementById('tab-board');
        var songsTab = document.getElementById('tab-songs');

        for (var i = 0; i < tabs.length; i++) {
          tabs[i].addEventListener('click', function () {
            for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove('active');
            this.classList.add('active');

            var target = this.dataset.tab;
            if (target === 'board') {
              boardTab.classList.remove('hidden');
              songsTab.classList.add('hidden');
            } else if (target === 'songs') {
              boardTab.classList.add('hidden');
              songsTab.classList.remove('hidden');
            } else {
              // Scroll mode — show both
              boardTab.classList.remove('hidden');
              songsTab.classList.remove('hidden');
            }
          });
        }
      })();
    </script>
  </div>

  <!-- Winner Celebration Overlay -->
  <div class="modal-overlay" id="celebration-overlay">
    <div class="modal">
      <h2 id="celebration-title">BINGO!</h2>
      <div class="winner-name" id="celebration-winner"></div>
      <p class="text-muted" id="celebration-subtitle"></p>
      <button class="btn btn-primary btn-lg" id="celebration-dismiss">Continue</button>
    </div>
  </div>

  <!-- Confetti container -->
  <div class="confetti-container" id="confetti-container"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- Confetti -->
  <script>
    window.launchConfetti = function () {
      var container = document.getElementById('confetti-container');
      if (!container) return;
      container.innerHTML = '';
      var colors = ['#ff2d75', '#ffab00', '#00e676', '#7b2ff7', '#00b0ff', '#ff6d00', '#e040fb', '#ffd600'];
      var shapes = ['50%', '0', '0 50% 50% 0'];
      for (var i = 0; i < 150; i++) {
        var p = document.createElement('div');
        p.className = 'confetti-piece';
        p.style.left = Math.random() * 100 + '%';
        p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        p.style.animationDelay = (Math.random() * 3) + 's';
        p.style.animationDuration = (2.5 + Math.random() * 3) + 's';
        p.style.width = (5 + Math.random() * 10) + 'px';
        p.style.height = (5 + Math.random() * 10) + 'px';
        p.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];
        container.appendChild(p);
      }
      setTimeout(function () { container.innerHTML = ''; }, 6000);
    };
  </script>

  <!-- App scripts -->
  <script src="js/firebase-config.js"></script>
  <script src="js/songs.js"></script>
  <script src="js/board.js"></script>
  <script src="js/bingo-check.js"></script>
  <script src="js/game.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
